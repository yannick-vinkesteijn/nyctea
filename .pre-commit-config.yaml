minimum_pre_commit_version: "3.7.0"
fail_fast: false

default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: forbid-new-submodules
      # - id: name-tests-test  # Disabled: Using pytest convention (test_*.py)
      - id: no-commit-to-branch
      - id: check-merge-conflict
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.22
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
        require_serial: true
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py314-plus, --keep-runtime-typing]
        exclude: ^src/nyctea/schema/model\.py$
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject
  # - repo: https://github.com/mgedmin/check-manifest
  #   rev: "0.51"
  #   hooks:
  #     - id: check-manifest
  - repo: https://github.com/trailofbits/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        args: [--strict]
  # Disabled temporarily - existing docs have formatting issues
  # - repo: https://github.com/executablebooks/mdformat
  #   rev: 1.0.0
  #   hooks:
  #     - id: mdformat
  #       additional_dependencies:
  #         - mdformat-mkdocs==5.0.0
  #         - mdformat-footnote==0.1.2
  #       files: "(README\\.md|docs/.*\\.md)"
  # - repo: https://github.com/igorshubovych/markdownlint-cli
  #   rev: v0.47.0
  #   hooks:
  #     - id: markdownlint-fix
  #       files: "(README\\.md|docs/.*\\.md)"
  - repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
      - id: typos
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.36.0
    hooks:
      - id: check-github-workflows
        files: ^\.github/workflows/.+\.ya?ml$
  # Disabled temporarily - action pinning is a separate task
  # - repo: https://github.com/zizmorcore/zizmor-pre-commit
  #   rev: v1.20.0
  #   hooks:
  #     - id: zizmor
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint
        stages: [manual]
        args:
          - "-ignore=SC2129"
          - "-ignore=SC2016"
        additional_dependencies:
          - github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1
