# Zensical configuration for Nyctea documentation

[project]
site_name = "Nyctea Documentation"
site_description = "Polars-optimized data validation library with Pydantic schemas"
site_author = "Nyctea Contributors"
# site_url = "https://nyctea.readthedocs.io"

copyright = """
Copyright &copy; 2025 Nyctea Contributors. MIT License.
"""

# Define navigation structure
nav = [
    { "Home" = "index.md" },
    { "User Guides" = [
        { "Overview" = "guides/index.md" },
        { "Quick Start" = "guides/quickstart.md" },
        { "Plugin Registry" = "guides/registry.md" },
    ]},
    { "API Reference" = [
        { "Overview" = "api/index.md" },
        { "Validation Engine" = "api/engine.md" },
        { "Plugin Registry" = "api/registry.md" },
        { "Schema Models" = "api/schema.md" },
        { "Data Ingestion" = "api/ingest.md" },
    ]},
    { "Development" = [
        { "Overview" = "development/index.md" },
        { "Roadmap" = "development/roadmap.md" },
        { "Breaking Changes" = "development/breaking-changes.md" },
        { "ADR: Pipeline Design" = "development/adr-pipeline-design.md" },
        { "ADR: Validation API" = "development/adr-validation-api.md" },
        { "Releasing" = "development/RELEASING.md" },
    ]},
]

[project.theme]
language = "en"
logo = "logo.png"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

# Color schemes — colors applied via docs/stylesheets/theme.css.
# Slate (dark) is listed first so it loads as the default.
[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

# Font configuration
[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

extra_css = ["stylesheets/theme.css"]

# Social links
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/yourusername/nyctea"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/nyctea"

# ----------------------------------------------------------------------------
# mkdocstrings configuration for API documentation
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = true
show_root_heading = true
heading_level = 2
