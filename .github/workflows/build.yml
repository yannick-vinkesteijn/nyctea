name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.24"
          python-version: "3.14"
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Check package
        run: |
          uv run --isolated --no-project --with twine twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  install-test:
    name: Install and test package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.24"
          python-version: "3.14"
          enable-cache: true

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Smoke test wheel
        run: |
          uv run --isolated --no-project --with dist/*.whl python -c "from nyctea import SchemaModel, MasterRegistry, register_builtins; print('✅ Import successful')"
