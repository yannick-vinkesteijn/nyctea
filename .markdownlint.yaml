# Markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/schema/.markdownlint.yaml

# MD013/line-length
MD013:
  line_length: 120
  heading_line_length: 120
  code_block_line_length: 120
  code_blocks: false
  tables: false
  headings: true
  strict: false
  stern: false

# Allow HTML needed by MkDocs Material (grids, admonitions)
MD033:
  allowed_elements:
    - div
    - img
    - br

# MkDocs files use YAML frontmatter before the first heading
MD041: false

# MkDocs admonitions and tabs use fenced blocks without a language
MD040: false
